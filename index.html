<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Tecnología - Forwarder Venture</title>
    
    <link rel="icon" type="image/jpg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background-color: #F8FAFC; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .text-fv-blue { color: #002e5f; }
        .bg-fv-blue { background-color: #002e5f; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .skeleton { background: #e2e8f0; background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%); background-size: 200% 100%; animation: 1.5s shine linear infinite; }
        @keyframes shine { to { background-position-x: -200%; } }
    </style>
</head>
<body class="min-h-screen flex flex-col text-gray-900">

    <div class="max-w-[1400px] mx-auto bg-white min-h-screen flex flex-col shadow-2xl w-full relative">
        
        <header class="bg-white px-6 py-4 sticky top-0 z-50 flex justify-between items-center border-b border-gray-100 h-[80px]">
            <img src="logo.png" alt="Forwarder Venture" class="w-[140px] object-contain" onerror="this.src='https://via.placeholder.com/140x40?text=FORWARDER'">
            <button onclick="toggleCart()" class="relative p-2 hover:bg-gray-100 rounded-full transition">
                <i class="fa-solid fa-cart-shopping text-2xl text-fv-blue"></i>
                <span id="cart-count" class="absolute top-0 right-0 bg-orange-600 text-white text-[10px] font-bold h-5 w-5 flex items-center justify-center rounded-full border-2 border-white">0</span>
            </button>
        </header>

        <div class="p-6 border-b border-gray-100 sticky top-[80px] bg-white z-40">
            <div class="flex flex-col md:flex-row gap-4 justify-between items-center">
                <nav id="category-nav" class="flex gap-2 overflow-x-auto w-full md:w-auto hide-scrollbar pb-1"></nav>
                <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto items-center">
                    <select id="sort-select" onchange="applyFilters()" class="w-full sm:w-48 pl-3 pr-10 py-3 bg-gray-50 border border-gray-300 rounded-xl text-xs font-bold outline-none appearance-none cursor-pointer uppercase">
                        <option value="recent">Más Recientes</option>
                        <option value="asc">Precio: Bajo a Alto</option>
                        <option value="desc">Precio: Alto a Bajo</option>
                        <option value="az">A - Z</option>
                    </select>
                    <div class="relative w-full md:w-72">
                        <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="search-input" oninput="applyFilters()" placeholder="Buscar producto..." class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-xs outline-none">
                    </div>
                </div>
            </div>
        </div>

        <main class="p-6 md:p-10 flex-grow bg-gray-50/50 pb-10">
            <div id="product-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6"></div>
            <div id="loading-trigger" class="py-10 text-center">
                <div id="skeleton-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6 hidden"></div>
                <div id="end-message" class="hidden py-10">
                    <p class="text-gray-400 font-black text-[10px] uppercase tracking-widest">Ya viste todos los productos</p>
                </div>
            </div>
        </main>
    </div>

    <div id="product-modal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm transition-opacity opacity-0">
        <div class="bg-white w-full max-w-xl rounded-3xl overflow-hidden relative shadow-2xl transform scale-95 transition-all" id="product-modal-content">
            <button onclick="closeModal()" class="absolute top-4 right-4 w-10 h-10 bg-black/5 rounded-full flex items-center justify-center z-20"><i class="fa-solid fa-xmark text-xl"></i></button>
            <div class="bg-white border-b border-gray-100 p-6 flex flex-col items-center">
                <div class="h-64 flex items-center justify-center w-full relative">
                    <img id="modal-img" src="" class="max-h-full max-w-full object-contain">
                </div>
                <div id="modal-gallery" class="flex gap-2 mt-4 overflow-x-auto w-full justify-center hide-scrollbar p-2"></div>
            </div>
            <div class="p-8">
                <span id="modal-type" class="text-orange-600 font-black text-[10px] uppercase tracking-widest"></span>
                <h2 id="modal-title" class="text-2xl font-black text-fv-blue mt-1 mb-4 uppercase"></h2>
                <div id="variant-section" class="mb-6 hidden">
                    <div id="variant-container" class="flex flex-wrap gap-2"></div>
                </div>
                <div class="mb-8 bg-gray-50 p-5 rounded-2xl border border-gray-100">
                    <span id="modal-price" class="text-3xl font-black text-fv-blue"></span>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="shareSingleProduct()" class="bg-[#F0FDF4] text-[#16A34A] rounded-2xl py-4 font-black uppercase"><i class="fa-brands fa-whatsapp"></i> Compartir</button>
                    <button onclick="addToCartFromModal()" class="bg-[#0F172A] text-white rounded-2xl py-4 font-black uppercase"><i class="fa-solid fa-plus"></i> Añadir</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="hidden fixed inset-0 bg-black/60 z-[200] flex justify-end">
        <div class="bg-white w-full max-w-md h-full flex flex-col shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-2xl font-black text-fv-blue uppercase tracking-tighter">TU PEDIDO</h2>
                <button onclick="toggleCart()"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto p-6 space-y-4 bg-gray-50"></div>
            <div class="p-6 border-t">
                <div class="flex justify-between items-center mb-6">
                    <span id="cart-total" class="text-3xl font-black text-fv-blue">$0</span>
                </div>
                <button onclick="sendOrderWhatsApp()" class="w-full bg-[#25D366] text-white py-4 rounded-2xl font-black flex items-center justify-center gap-3">
                    <i class="fa-brands fa-whatsapp text-2xl"></i> ENVIAR PEDIDO
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-24 left-1/2 transform -translate-x-1/2 bg-fv-blue text-white px-6 py-3 rounded-full shadow-2xl z-[4000] opacity-0 transition-opacity pointer-events-none font-bold">Agregado con éxito</div>

    <script>
        const WHATSAPP_NUMBER = '3114957971'; 
        const SHEET_ID = '17a0Pxq1EOLRf86yiuM014ZluVqL2Qj1Mt8cKRDenjHc';
        const GID = '0'; // Corregido a 0
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        let allGroups = [];
        let cart = [];
        let currentCategory = 'Ver Todo';
        let filteredGroups = [];
        let itemsToShow = 50;
        let currentPage = 1;
        let isLoading = false;
        let selectedGroup = null;
        let selectedVariant = null;

        function formatMoney(amount) {
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(amount);
        }

        function loadProducts() {
            Papa.parse(CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    const tempGroups = {};
                    results.data.forEach((row, index) => {
                        const sku = row['SKU']?.trim();
                        const pSku = row['PARENT SKU']?.trim() || sku;
                        if (!sku) return;

                        // Captura de precio más flexible (detecta Precio, PRECIO 1 o Precio Venta)
                        let rawPrice = row['PRECIO 1'] || row['Precio'] || row['Precio Venta'] || '0';
                        const precioVenta = parseInt(rawPrice.toString().replace(/\D/g, '')) || 0;
                        
                        // Captura de imagen
                        let imgField = row['IMAGEN'] || '';
                        let imgs = imgField.split('|').map(i => i.trim()).filter(i => i.includes('http'));
                        if (imgs.length === 0) imgs = ['https://via.placeholder.com/400?text=Cargando+Imagen...'];

                        if (!tempGroups[pSku]) {
                            tempGroups[pSku] = { id: pSku, nombre: row['NOMBRE'], tipo: row['TIPO'] || 'General', index: index, skuMap: {} };
                        }
                        tempGroups[pSku].skuMap[sku] = { sku: sku, variable: row['VARIABLE'] || row['COLOR'] || '', imgs: imgs, precio: precioVenta };
                    });

                    allGroups = Object.values(tempGroups).map(g => ({ ...g, variaciones: Object.values(g.skuMap) }));
                    updateCategoryNav();
                    applyFilters();
                }
            });
        }

        function updateCategoryNav() {
            const types = ['Ver Todo', ...new Set(allGroups.map(p => p.tipo))].sort();
            document.getElementById('category-nav').innerHTML = types.map(t => 
                `<button onclick="filterType('${t}')" class="px-5 py-2 rounded-xl text-[10px] font-black whitespace-nowrap border transition-all ${t === currentCategory ? 'bg-fv-blue text-white' : 'bg-white text-gray-500'}">${t.toUpperCase()}</button>`
            ).join('');
        }

        function filterType(t) { currentCategory = t; updateCategoryNav(); applyFilters(); }

        function applyFilters() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const sortMode = document.getElementById('sort-select').value;
            filteredGroups = allGroups.filter(p => (currentCategory === 'Ver Todo' || p.tipo === currentCategory) && p.nombre.toLowerCase().includes(search));
            
            if (sortMode === 'asc') filteredGroups.sort((a, b) => a.variaciones[0].precio - b.variaciones[0].precio);
            else if (sortMode === 'desc') filteredGroups.sort((a, b) => b.variaciones[0].precio - a.variaciones[0].precio);
            else if (sortMode === 'az') filteredGroups.sort((a, b) => a.nombre.localeCompare(b.nombre));

            currentPage = 1;
            document.getElementById('product-grid').innerHTML = '';
            document.getElementById('end-message').classList.add('hidden');
            renderMoreItems();
        }

        function renderMoreItems() {
            if (isLoading) return;
            isLoading = true;
            const grid = document.getElementById('product-grid');
            const skeleton = document.getElementById('skeleton-container');
            skeleton.classList.remove('hidden');

            setTimeout(() => {
                const chunk = filteredGroups.slice((currentPage - 1) * itemsToShow, currentPage * itemsToShow);
                skeleton.classList.add('hidden');

                if (chunk.length > 0) {
                    const html = chunk.map(p => {
                        const main = p.variaciones[0];
                        return `
                        <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 flex flex-col cursor-pointer hover:shadow-md transition-all" onclick="openModal('${p.id}')">
                            <div class="aspect-square p-2 bg-white flex items-center justify-center relative">
                                <img src="${main.imgs[0]}" class="max-h-full max-w-full object-contain" loading="lazy">
                                <div class="absolute top-2 left-2 bg-white/90 px-2 py-1 rounded text-[8px] font-black uppercase text-fv-blue border border-gray-50">${p.tipo}</div>
                            </div>
                            <div class="p-4 flex flex-col flex-grow">
                                <h3 class="font-bold text-[11px] text-fv-blue leading-tight mb-2 h-8 line-clamp-2 uppercase">${p.nombre}</h3>
                                <div class="mt-auto flex justify-between items-center pt-3 border-t border-gray-50">
                                    <p class="text-[14px] font-black text-fv-blue">${formatMoney(main.precio)}</p>
                                    <div class="flex gap-1">
                                        <button onclick="quickShare(event, '${p.id}')" class="w-8 h-8 bg-green-50 text-green-600 rounded-lg flex items-center justify-center"><i class="fa-brands fa-whatsapp"></i></button>
                                        <button onclick="quickAdd(event, '${p.id}')" class="w-8 h-8 bg-fv-blue text-white rounded-lg flex items-center justify-center"><i class="fa-solid fa-plus"></i></button>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    }).join('');
                    grid.insertAdjacentHTML('beforeend', html);
                }
                isLoading = false;
                if (currentPage * itemsToShow >= filteredGroups.length && filteredGroups.length > 0) document.getElementById('end-message').classList.remove('hidden');
            }, 300);
        }

        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                if (!isLoading && (currentPage * itemsToShow < filteredGroups.length)) { currentPage++; renderMoreItems(); }
            }
        });

        function openModal(groupId) {
            selectedGroup = allGroups.find(p => p.id === groupId);
            if(!selectedGroup) return;
            selectedVariant = selectedGroup.variaciones[0];
            updateModalUI();
            const modal = document.getElementById('product-modal');
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.replace('opacity-0', 'opacity-100'), 10);
        }

        function updateModalUI() {
            document.getElementById('modal-title').innerText = selectedGroup.nombre;
            document.getElementById('modal-type').innerText = selectedGroup.tipo;
            document.getElementById('modal-img').src = selectedVariant.imgs[0];
            document.getElementById('modal-price').innerText = formatMoney(selectedVariant.precio);
            const vs = document.getElementById('variant-section');
            if (selectedGroup.variaciones.length > 1) {
                vs.classList.remove('hidden');
                document.getElementById('variant-container').innerHTML = selectedGroup.variaciones.map((v, i) => 
                    `<button onclick="selectVar(${i})" class="variant-btn ${v === selectedVariant ? 'active' : ''}">${v.variable || 'OPC '+(i+1)}</button>`
                ).join('');
            } else vs.classList.add('hidden');
        }

        function selectVar(i) { selectedVariant = selectedGroup.variaciones[i]; updateModalUI(); }
        function closeModal() { const m = document.getElementById('product-modal'); m.classList.replace('opacity-100', 'opacity-0'); setTimeout(() => m.classList.add('hidden'), 200); }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        function quickAdd(event, id) {
            event.stopPropagation();
            const g = allGroups.find(p => p.id === id);
            const v = g.variaciones[0];
            if(!cart.find(c => c.sku === v.sku)) cart.push({ ...v, nombre: g.nombre });
            updateCartUI(); showToast();
        }

        function addToCartFromModal() {
            if(!cart.find(c => c.sku === selectedVariant.sku)) cart.push({ ...selectedVariant, nombre: selectedGroup.nombre });
            updateCartUI(); closeModal(); showToast();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            let total = 0;
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => {
                total += item.precio;
                return `<div class="flex gap-4 bg-white p-3 rounded-xl border border-gray-100">
                    <img src="${item.imgs[0]}" class="w-12 h-12 object-contain">
                    <div class="flex-grow"><p class="font-bold text-[10px] uppercase">${item.nombre}</p><p class="font-black text-xs">${formatMoney(item.precio)}</p></div>
                    <button onclick="cart.splice(${i}, 1); updateCartUI();" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = formatMoney(total);
        }

        function showToast() { const t = document.getElementById('toast'); t.classList.replace('opacity-0', 'opacity-100'); setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2000); }

        function quickShare(event, id) {
            event.stopPropagation();
            const g = allGroups.find(p => p.id === id);
            const text = `🚀 *TECH - FORWARDER VENTURE*%0A%0A*${g.nombre}*%0A_Consulta precio y disponibilidad aquí._`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${text}`, '_blank');
        }

        function shareSingleProduct() { 
            const text = `🚀 *TECH - FORWARDER VENTURE*%0A%0A*${selectedGroup.nombre}*%0A_Consulta precio y disponibilidad aquí._`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${text}`, '_blank');
        }

        function sendOrderWhatsApp() {
            let msg = `🚀 *PEDIDO TECH - FORWARDER VENTURE*%0A%0A`;
            cart.forEach(item => msg += `• *${item.nombre}* - ${formatMoney(item.precio)}%0A`);
            msg += `%0A*TOTAL: ${document.getElementById('cart-total').innerText}*`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`, '_blank');
        }

        loadProducts();
    </script>
</body>
</html>
